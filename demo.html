<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>데모 — AI로 만드는 한국어 수업</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f9f9f7;--bg-alt:#f0efed;
  --text:#1a1a1a;--text-sub:#888;--text-light:#bbb;
  --blue:#185FA5;--blue-light:#EBF5FF;
  --green:#2E8B57;--green-light:#F0FFF4;
  --amber:#B8860B;--amber-light:#FFF8E1;
  --border:#e0e0de;--card:#fff;--radius:16px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden;}

.nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(249,249,247,0.92);backdrop-filter:blur(16px);box-shadow:0 1px 0 var(--border);padding:16px 0;}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-weight:900;font-size:16px;text-decoration:none;color:var(--text);}
.nav-links{display:flex;gap:28px;align-items:center;}
.nav-links a{font-size:13px;font-weight:500;color:var(--text-sub);text-decoration:none;transition:color .2s;}
.nav-links a:hover{color:var(--text);}
.nav-links a.active{color:var(--text);font-weight:700;border-bottom:2px solid var(--text);padding-bottom:2px;}
.container{max-width:1100px;margin:0 auto;padding:0 32px;}
.section-tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--blue);margin-bottom:12px;}

.page-header{padding:120px 0 24px;text-align:center;}
.page-header h1{font-size:clamp(32px,5vw,52px);font-weight:900;line-height:1.15;letter-spacing:-0.03em;margin-bottom:12px;}
.page-header p{font-size:17px;color:var(--text-sub);max-width:480px;margin:0 auto;}

/* ── 데모 그리드 ── */
.demo-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin:48px auto 40px;
  max-width:900px;
}
.demo-card{
  background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);
  overflow:hidden;text-decoration:none;color:inherit;
  transition:transform .25s,box-shadow .25s;
  display:flex;flex-direction:column;
}
.demo-card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,0.06);}
.demo-thumb{
  height:160px;display:flex;align-items:center;justify-content:center;
  font-size:56px;
  position:relative;
}
.demo-thumb.t1{background:var(--blue-light);}
.demo-thumb.t2{background:var(--green-light);}
.demo-thumb.t3{background:var(--amber-light);}
.demo-info{padding:18px 20px;flex:1;display:flex;flex-direction:column;}
.demo-info h3{font-size:15px;font-weight:800;margin-bottom:4px;}
.demo-info p{font-size:12px;color:var(--text-sub);line-height:1.5;flex:1;}
.demo-badge{
  display:inline-block;margin-top:10px;
  font-size:10px;font-weight:600;
  padding:3px 10px;border-radius:5px;
  background:var(--bg-alt);color:var(--text-sub);
  align-self:flex-start;
}

/* ── 업데이트 예정 ── */
.coming{
  text-align:center;
  padding:60px 0 80px;
  max-width:480px;margin:0 auto;
}
.coming .coming-icon{font-size:48px;margin-bottom:16px;opacity:0.4;}
.coming h3{font-size:18px;font-weight:800;margin-bottom:8px;}
.coming p{font-size:14px;color:var(--text-sub);line-height:1.7;}

.reveal{opacity:0;transform:translateY(20px);transition:opacity .5s cubic-bezier(.22,1,.36,1),transform .5s cubic-bezier(.22,1,.36,1);}
.reveal.vis{opacity:1;transform:translateY(0);}

@media(max-width:768px){.demo-grid{grid-template-columns:1fr;}}
footer{padding:32px 0;text-align:center;font-size:12px;color:var(--text-light);border-top:0.5px solid var(--border);}
</style>
</head>
<body>

<nav class="nav"><div class="nav-inner"><a class="nav-logo" href="index.html">AI 한국어 수업</a><div class="nav-links"><a href="index.html">홈</a><a href="guide.html">기본도구</a><a href="activity.html">활동</a><a href="demo.html" class="active">데모</a><a href="column.html">칼럼</a><a href="faq.html">FAQ</a></div></div></nav>

<header class="page-header">
  <div class="container">
    <div class="section-tag">Demo</div>
    <h1>데모</h1>
    <p>직접 사용해볼 수 있는 한국어 학습 도구와 게임 모음입니다.</p>
  </div>
</header>

<div class="container">

  <div class="coming reveal">
    <div class="coming-icon">🚧</div>
    <h3>계속 업데이트됩니다</h3>
    <p>새로운 학습 도구와 게임이 추가될 예정이에요.<br>궁금한 점이나 요청은 홈에서 메시지를 보내주세요.</p>
  </div>
</div>

<footer><div class="container">© 2026 AI로 만드는 한국어 수업</div></footer>

<script>
const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('vis');});},{threshold:0.1});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
</body>
</html>
