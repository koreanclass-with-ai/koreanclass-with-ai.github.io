<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>활동 설계 — AI로 만드는 한국어 수업</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f9f9f7;--bg-alt:#f0efed;
  --text:#1a1a1a;--text-sub:#888;--text-light:#bbb;
  --blue:#185FA5;--blue-light:#EBF5FF;
  --green:#2E8B57;--green-light:#F0FFF4;
  --amber:#B8860B;--amber-light:#FFF8E1;
  --red:#C0392B;--red-light:#FFF0F0;
  --purple:#6B4F9E;--purple-light:#F3EFFA;
  --border:#e0e0de;--card:#fff;--radius:16px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden;}

/* ── 네비 ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(249,249,247,0.92);backdrop-filter:blur(16px);box-shadow:0 1px 0 var(--border);padding:16px 0;}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-weight:900;font-size:16px;text-decoration:none;color:var(--text);}
.nav-links{display:flex;gap:28px;align-items:center;}
.nav-links a{font-size:13px;font-weight:500;color:var(--text-sub);text-decoration:none;transition:color .2s;}
.nav-links a:hover{color:var(--text);}
.nav-links a.active{color:var(--text);font-weight:700;border-bottom:2px solid var(--text);padding-bottom:2px;}
.container{max-width:1100px;margin:0 auto;padding:0 32px;}
.section-tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--blue);margin-bottom:12px;}

/* ── 헤더 ── */
.page-header{padding:120px 0 28px;text-align:center;}
.page-header h1{font-size:clamp(32px,5vw,52px);font-weight:900;line-height:1.15;letter-spacing:-0.03em;margin-bottom:12px;}
.page-header p{font-size:16px;color:var(--text-sub);max-width:560px;margin:0 auto;}
.page-header p b{color:var(--text);}
.find-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:18px;}
.find-link{font-size:12.5px;color:var(--green);background:var(--green-light);border-radius:8px;padding:6px 14px;text-decoration:none;font-weight:600;}
.find-link.soon{color:var(--text-light);background:var(--bg-alt);cursor:default;}

/* ── 5축 탭 ── */
.filter-bar{position:sticky;top:60px;z-index:100;background:rgba(249,249,247,0.92);backdrop-filter:blur(12px);border-bottom:0.5px solid var(--border);padding:16px 0;margin-bottom:48px;}
.filter-inner{display:flex;align-items:center;gap:8px;overflow-x:auto;scrollbar-width:none;}
.filter-inner::-webkit-scrollbar{display:none;}
.filter-btn{padding:8px 16px;font-size:13px;font-weight:500;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text-sub);cursor:pointer;white-space:nowrap;transition:all .2s;}
.filter-btn:hover{color:var(--text);}
.filter-btn.active{color:var(--text);font-weight:700;border-bottom-color:var(--text);}
.filter-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.filter-count{font-size:12px;color:var(--text-light);white-space:nowrap;}

/* ── 그룹 ── */
.cat-sec{margin-bottom:64px;}
.cat-head{display:flex;align-items:flex-end;gap:16px;margin-bottom:24px;padding-bottom:16px;border-bottom:0.5px solid var(--border);flex-wrap:wrap;}
.cat-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:10px;font-size:13px;font-weight:700;flex-shrink:0;}
.cb-형태{background:var(--blue-light);color:var(--blue);}
.cb-의미{background:var(--green-light);color:var(--green);}
.cb-기능{background:var(--amber-light);color:var(--amber);}
.cb-과제{background:var(--red-light);color:var(--red);}
.cb-게임{background:var(--purple-light);color:var(--purple);}
.cb-중립{background:var(--bg-alt);color:var(--text-sub);}
.cat-head h2{font-size:22px;font-weight:800;letter-spacing:-0.01em;}
.cat-cnt{font-size:13px;color:var(--text-light);font-weight:500;}
.cat-desc{font-size:13px;color:var(--text-sub);margin-left:auto;max-width:380px;text-align:right;}
.cat-extra{font-size:12.5px;color:var(--text-sub);margin:-12px 0 20px;}
.cat-extra a{color:var(--green);font-weight:700;text-decoration:none;}

/* ── 카드 그리드 ── */
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.ac{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;text-decoration:none;color:inherit;transition:transform .25s,box-shadow .25s;display:flex;flex-direction:column;position:relative;}
.ac:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,0.06);}
.ac.dim{opacity:.72;cursor:default;}
.ac.dim:hover{transform:none;box-shadow:none;}

/* 썸네일 */
.ct{height:110px;display:flex;align-items:center;justify-content:center;padding:12px;position:relative;}
.ct-형태{background:var(--blue-light);}
.ct-의미{background:var(--green-light);}
.ct-기능{background:var(--amber-light);}
.ct-과제{background:var(--red-light);}
.ct-게임{background:var(--purple-light);}
.m{background:var(--card);border-radius:12px;box-shadow:0 3px 14px rgba(0,0,0,0.07);padding:12px 18px;font-size:13px;font-weight:600;text-align:center;max-width:180px;transition:transform .3s;}
.ac:hover .m{transform:scale(1.03);}

/* 상태 뱃지 */
.status{position:absolute;top:10px;right:10px;font-size:9.5px;font-weight:700;padding:2px 9px;border-radius:6px;letter-spacing:0.03em;}
.s-done{background:var(--green-light);color:var(--green);border:0.5px solid var(--green);}
.s-p1{background:var(--text);color:#fff;}
.s-later{background:var(--bg-alt);color:var(--text-sub);}

/* 카드 정보 */
.ci{padding:14px 18px;flex:1;display:flex;flex-direction:column;}
.c-tags{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap;}
.c-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:0.02em;}
.t-형태{background:var(--blue-light);color:var(--blue);}
.t-의미{background:var(--green-light);color:var(--green);}
.t-기능{background:var(--amber-light);color:var(--amber);}
.t-과제{background:var(--red-light);color:var(--red);}
.t-게임{background:var(--purple-light);color:var(--purple);}
.t-type{background:var(--bg-alt);color:var(--text-sub);}
.ci h3{font-size:14px;font-weight:800;margin-bottom:2px;letter-spacing:-0.01em;}
.c-desc{font-size:11px;color:var(--text-sub);line-height:1.5;flex:1;}
.var-line{font-size:10.5px;color:var(--text-light);line-height:1.5;border-top:0.5px solid var(--border);padding-top:8px;margin-top:10px;}
.var-line b{color:var(--text-sub);font-weight:700;}
.demo-link{font-size:10.5px;color:var(--green);font-weight:700;margin-top:6px;}

/* 애니메이션 */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .5s cubic-bezier(.22,1,.36,1),transform .5s cubic-bezier(.22,1,.36,1);}
.reveal.vis{opacity:1;transform:translateY(0);}

@media(max-width:900px){.ag{grid-template-columns:repeat(2,1fr);}}
@media(max-width:560px){.ag{grid-template-columns:1fr;}.cat-head{flex-direction:column;align-items:flex-start;}.cat-desc{margin-left:0;text-align:left;}}
footer{padding:32px 0;text-align:center;font-size:12px;color:var(--text-light);border-top:0.5px solid var(--border);}
</style>
</head>

  media:["텍스트","이미지","음성","복합"],
  interaction:["개인","개인·짝","개인·AI","짝","그룹"],
  language:["문법","어휘","문법·어휘","듣기","읽기","쓰기","말하기","듣기·쓰기","종합"],
};
const axisDesc = {
  category:{
    "형태 학습":"정확성을 다지는 연습 — 자동채점되는 문항 엔진들",
    "의미 구성":"읽고 듣고 이해하기 — 자료 생성이 본체",
    "기능 연습":"상황에 맞는 표현 — AI 피드백이 주역",
    "과제 수행":"실제 과업 해내기 — 시뮬레이션과 프로젝트",
    "게임":"같은 문항이 게임으로 — 완성본은 체험하기에서",
  },
  format:{"선택형":"보기에서 고르기","완성형":"빈칸·입력 채우기","변환형":"바꿔 쓰기","배열형":"순서 맞추기 (드래그)","연결형":"짝짓기","선택+서술":"자료 + 문항 결합","서술형":"직접 쓰기","자료 생성":"앱이 아니라 자료 세트가 산출물","게임":"게임 장치 결합"},
  media:{"텍스트":"글로 제시","이미지":"그림으로 제시","음성":"소리로 제시","복합":"여러 매체 결합"},
  interaction:{"개인":"혼자 푸는 활동","개인·짝":"혼자 또는 둘이","개인·AI":"AI가 상대 역할","짝":"둘이 정보 교환","그룹":"여럿이 협력"},
  language:{},
};

let currentAxis = "category";

function cardHTML(c){
  const sMap = {done:['s-done','완성'], p1:['s-p1','1차 준비'], later:['s-later','연재 예정']};
  const [cls,label] = sMap[c.status];
  const col = catColor[c.cat];
  const dead = c.href === "#";
  const demoLink = c.demo ? `<div class="demo-link">▶ 완성본은 체험하기에서 먼저 →</div>` : "";
  return `<a class="ac reveal vis ${dead?'dim':''}" href="${c.href}" ${dead?'onclick="return false;"':''}>
    <span class="status ${cls}">${label}</span>
    <div class="ct ct-${col}"><div class="m">${c.prev}</div></div>
    <div class="ci">
      <div class="c-tags"><span class="c-tag t-${col}">${c.cat}</span><span class="c-tag t-type">${c.media}</span><span class="c-tag t-type">${c.interaction}</span></div>
      <h3>${c.t}</h3>
      <p class="c-desc">${c.d}</p>
      <div class="var-line"><b>응용 ${c.vars}가지</b> — ${c.vx} …</div>
      ${demoLink}
    </div>
  </a>`;
}

function render(){
  const box = document.getElementById("groups");
  const key = axisKey[currentAxis];
  let html = "";
  axisOrder[currentAxis].forEach(val=>{
    const matched = recipes.filter(c=>c[key]===val);
    if(matched.length===0) return;
    const desc = (axisDesc[currentAxis]||{})[val] || "";
    const varSum = matched.reduce((a,c)=>a+c.vars,0);
    const badgeCls = (currentAxis==="category") ? `cb-${catColor[val]}` : "cb-중립";
    const extra = (currentAxis==="category" && val==="게임")
      ? `<div class="cat-extra">🎮 게임은 만들기보다 <a href="demo.html">바로 쓰기</a> 수요가 커요 — 완성본을 체험하기에 진열하고, 만드는 법은 차차 공개해요.</div>` : "";
    html += `<section class="cat-sec">
      <div class="cat-head"><span class="cat-badge ${badgeCls}">${val}</span><h2>${val}</h2><span class="cat-cnt">기본 ${matched.length} · 응용 ${varSum}</span>${desc?`<span class="cat-desc">${desc}</span>`:""}</div>
      ${extra}
      <div class="ag">${matched.map(cardHTML).join("")}</div>
    </section>`;
  });
  box.innerHTML = html;
}

document.querySelectorAll(".filter-btn").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll(".filter-btn").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    currentAxis = tab.dataset.axis;
    render();
  });
});
render();
</script>
</body>
</html>
